<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Financial</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body class="dashboard-page">

<div class="app-layout">

<main class="main-content doctor-financial-page">

<header class="topbar">
    <div class="top-logo">
        <img class="moving-logo" src="../assets/logo.png" alt="AXIS Logo">
    </div>

    <div class="date-box" id="currentDate"></div>

    <button class="lang-btn" onclick="toggleDoctorLanguage()" id="doctorLangBtn">
        العربية
    </button>

    <button class="theme-btn" onclick="toggleTheme()">🌙</button>

    <div class="top-actions">
        <div class="user-box">
            <div>
                <strong id="doctorNameTop">Doctor</strong>
                <small id="doctorPortalText">Financial Section</small>
            </div>
            <div class="avatar">DR</div>
        </div>
    </div>
</header>

<section class="orders-header doctor-financial-header">
    <div>
        <h1 id="doctorFinancialPageTitle">Financial</h1>
        <p id="doctorFinancialPageDesc">View your account details and case prices</p>
    </div>
</section>

<section class="stats-grid doctor-financial-stats">

    <div class="stat-card blue">
        <div class="stat-icon">💰</div>
        <h3 id="financialTotalDueTitle">Total Due</h3>
        <strong id="financialTotalDue">0 JD</strong>
    </div>

    <div class="stat-card green">
        <div class="stat-icon">✅</div>
        <h3 id="financialTotalPaidTitle">Total Paid</h3>
        <strong id="financialTotalPaid">0 JD</strong>
    </div>

    <div class="stat-card red">
        <div class="stat-icon">📌</div>
        <h3 id="financialRemainingTitle">Remaining</h3>
        <strong id="financialRemaining">0 JD</strong>
    </div>

</section>

<section class="doctor-financial-card">

    <div class="doctor-financial-card-title">
        <div>
            <h2 id="financialTableTitle">Financial Details</h2>
            <p id="financialTableDesc">Case payments and remaining balances</p>
        </div>

        <span class="financial-count-badge">JD</span>
    </div>

    <div class="doctor-financial-table-wrap">
        <table class="orders-table doctor-financial-table">

            <thead>
                <tr>
                    <th id="financialThOrderId">Order ID</th>
                    <th id="financialThPatient">Patient</th>
                    <th id="financialThWorkType">Work Type</th>
                    <th id="financialThPrice">Price</th>
                    <th id="financialThPaid">Paid</th>
                    <th id="financialThRemaining">Remaining</th>
                </tr>
            </thead>

            <tbody id="financialTableBody"></tbody>

        </table>
    </div>

</section>

</main>

<aside class="right-sidebar">

    <div class="page-title-box">
        <h2 id="doctorSideTitle">DOCTOR</h2>
    </div>

    <nav class="doctor-side-menu doctor-menu">
        <a id="doctorMenuDashboard" href="doctor-dashboard.html">لوحة التحكم</a>
        <a id="doctorMenuOrders" href="doctor-order-management.html">إدارة طلبات</a>
        <a id="doctorMenuFinancial" class="active" href="doctor-financial.html">المالية</a>
        <a id="doctorMenuAppointment" href="doctor-appointment.html">حجز موعد</a>
    </nav>

    <button class="logout-btn" onclick="logout()" id="doctorLogoutBtn">
        Logout
    </button>

</aside>

</div>

<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/doctor-financial.js"></script>
<script src="../js/doctor-language.js"></script>

</body>
</html>
