<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIS Doctor Order Management</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body class="dashboard-page">

<div class="app-layout">

<main class="main-content doctor-orders-page">

<header class="topbar">
    <div class="top-logo">
        <img class="moving-logo" src="../assets/logo.png" alt="AXIS Logo">
    </div>

    <div class="date-box" id="currentDate"></div>

    <button class="lang-btn" onclick="toggleDoctorLanguage()" id="doctorLangBtn">
        العربية
    </button>

    <button class="theme-btn" onclick="toggleTheme()">🌙</button>

    <div class="top-actions">

        <div class="user-box">
            <div>
                <strong id="doctorNameTop">Doctor</strong>
                <small id="doctorPortalText">Doctor Portal</small>
            </div>
            <div class="avatar">DR</div>
        </div>
    </div>
</header>

<section class="orders-header doctor-orders-header">
    <div>
        <h1 id="doctorOrderPageTitle">Order Management</h1>
        <p id="doctorOrderPageDesc">Add, edit and manage your own orders</p>
    </div>

    <button class="primary-btn doctor-new-order-btn" id="doctorNewOrderBtn" onclick="openDoctorOrderModal()">
        + New Order
    </button>
</section>

<section class="doctor-orders-card">

    <div class="doctor-orders-card-title">
        <div>
            <h2 id="doctorOrdersTitle">My Orders: 0</h2>
            <p>Manage your submitted laboratory cases</p>
        </div>

        <span class="doctor-orders-badge">📋</span>
    </div>

    <div class="doctor-orders-table-wrap">
        <table class="orders-table doctor-orders-table">
            <thead>
                <tr>
                    <th id="omThActions">Actions</th>
                    <th id="omThStatus">Status</th>
                    <th id="omThOrderId">Order ID</th>
                    <th id="omThPatient">Patient</th>
                    <th id="omThWorkType">Work Type</th>
                    <th id="omThOrderDate">Order Date</th>
                    <th id="omThDeliveryDate">Delivery Date</th>
                    <th id="omThPriority">Priority</th>
                    <th id="omThPrice">Price</th>
                </tr>
            </thead>

            <tbody id="doctorOrdersTableBody"></tbody>
        </table>
    </div>

</section>

<div class="modal" id="doctorOrderModal">
    <div class="modal-content wide-modal doctor-order-modal">

        <div class="modal-header">
            <h2 id="doctorOrderModalTitle">Add New Order</h2>
            <button type="button" onclick="closeDoctorOrderModal()">✕</button>
        </div>

        <form id="doctorOrderForm" class="order-form order-form-grid doctor-order-form">

            <div class="form-group">
                <label id="doctorPatientLabel">Patient Name</label>
                <input type="text" id="doctorPatientName" required>
            </div>

            <div class="form-group">
                <label id="doctorWorkTypeLabel">Type Of Work</label>
                <select id="doctorWorkType" required>
                    <option value="">Select Type of Work</option>
                    <option>Zirconia Crown</option>
                    <option>E-max Crown</option>
                    <option>Veneer</option>
                    <option>Bridge</option>
                    <option>Implant Crown</option>
                    <option>Implant Bridge</option>
                    <option>Partial Denture</option>
                    <option>Complete Denture</option>
                    <option>Night Guard</option>
                    <option>Retainer</option>
                    <option>Repair</option>
                </select>
            </div>

            <div class="form-group">
                <label id="doctorDeliveryLabel">Delivery Date</label>
                <input type="date" id="doctorDeliveryDate" required>
            </div>

            <div class="form-group">
                <label id="doctorPriorityLabel">Priority</label>
                <select id="doctorPriority" required>
                    <option>Normal</option>
                    <option>Urgent</option>
                    <option>Low</option>
                </select>
            </div>

            <div class="form-group">
                <label id="doctorCasePriceLabel">Case Price</label>
                <input type="number" id="doctorCasePrice" value="0">
            </div>

            <div class="form-group">
                <label id="doctorPaidAmountLabel">Paid Amount</label>
                <input type="number" id="doctorPaidAmount" value="0">
            </div>

            <div class="form-group doctor-order-notes">
                <label id="doctorNotesLabel">Notes</label>
                <textarea id="doctorOrderNotes"></textarea>
            </div>

            <div class="modal-actions doctor-order-actions">
                <button type="button" class="cancel-btn" id="doctorCancelBtn" onclick="closeDoctorOrderModal()">Cancel</button>
                <button type="submit" class="primary-btn" id="doctorSaveOrderBtn">Save Order</button>
            </div>

        </form>

    </div>
</div>

</main>

<aside class="right-sidebar">

    <div class="page-title-box">
        <h2 id="doctorSideTitle">DOCTOR</h2>
    </div>

    <nav class="doctor-side-menu doctor-menu">
        <a id="doctorMenuDashboard" href="doctor-dashboard.html">لوحة التحكم</a>
        <a id="doctorMenuOrders" class="active" href="doctor-order-management.html">إدارة طلبات</a>
        <a id="doctorMenuFinancial" href="doctor-financial.html">المالية</a>
        <a id="doctorMenuAppointment" href="doctor-appointment.html">حجز موعد</a>
    </nav>

    <button class="logout-btn" onclick="logout()" id="doctorLogoutBtn">Logout</button>

</aside>

</div>

<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/activity.js"></script>
<script src="../js/doctor-order-management.js"></script>
<script src="../js/doctor-language.js"></script>

</body>
</html>
